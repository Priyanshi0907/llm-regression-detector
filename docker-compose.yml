version: "3.9"

services:
  eval-runner:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: ["--prompt", "prompts/v8.yaml"]

  dashboard:
    build: .
    env_file: .env
    entrypoint: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
